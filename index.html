<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>OnlyMemes</title>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
    --bg: #ffffff;
    --surface: #ffffff;
    --card: #ffffff;
    --text: #101010;
    --text-dim: rgba(16, 16, 16, 0.7);
    --text-light: rgba(16, 16, 16, 0.5);
    --accent: #101010;
    --accent-text: #ffffff;
    --border: #101010;
    --radius: 0px; /* Геометричный стиль */
    --radius-sm: 0px;
    --shadow: none;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --app-max: 520px;
}

[data-theme="dark"] {
    --bg: #101010;
    --surface: #101010;
    --card: #101010;
    --text: #ffffff;
    --text-dim: rgba(255, 255, 255, 0.7);
    --text-light: rgba(255, 255, 255, 0.5);
    --accent: #ffffff;
    --accent-text: #101010;
    --border: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { 
    font-family: 'Geologica', sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    display: flex; 
    justify-content: center; 
    transition: background 0.2s;
}

#app { width: 100%; max-width: var(--app-max); height: 100%; position: relative; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

/* Исправленные чекбоксы */
.checkbox-row { display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; padding: 8px 0; }
.checkbox-row input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border: 2px solid var(--border);
    background: var(--bg);
    position: relative;
    cursor: pointer;
    flex-shrink: 0;
}
.checkbox-row input[type="checkbox"]:checked { background: var(--accent); }
.checkbox-row input[type="checkbox"]:checked::after {
    content: 'done';
    font-family: 'Material Icons Round';
    font-size: 18px;
    color: var(--accent-text);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
}

/* Кнопки и формы */
input, textarea {
    font-family: inherit; font-size: 16px; color: var(--text); background: var(--bg);
    border: 2px solid var(--border); padding: 14px; width: 100%; outline: none;
}
input::placeholder { color: var(--text-light); }
.btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 16px 24px; font-weight: 800; border: 2px solid var(--border);
    cursor: pointer; font-family: inherit; text-transform: uppercase; letter-spacing: 1px;
}
.btn-primary { background: var(--accent); color: var(--accent-text); }
.btn-secondary { background: var(--bg); color: var(--text); }
.btn:active { transform: translate(2px, 2px); }

/* Экраны */
.screen { position: absolute; inset: 0; overflow-y: auto; padding: 20px; background: var(--bg); padding-bottom: 100px; }
.screen:not(.active) { display: none; }

.header { 
    position: sticky; top: 0; background: var(--bg); z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 0; border-bottom: 2px solid var(--border); margin-bottom: 20px;
}
.header-title { font-size: 24px; font-weight: 900; text-transform: uppercase; }

/* Посты */
.post { padding: 20px 0; border-bottom: 2px solid var(--border); }
.post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
.post-avatar { width: 44px; height: 44px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 24px; }
.post-username { font-weight: 800; font-size: 16px; }
.post-handle { color: var(--text-dim); font-size: 13px; }
.post-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; }
.post-content { line-height: 1.6; margin-bottom: 15px; }
.post-actions { display: flex; gap: 10px; }
.post-action { 
    background: none; border: 2px solid var(--border); color: var(--text);
    padding: 8px 12px; display: flex; align-items: center; gap: 6px; font-weight: 700; cursor: pointer;
}
.post-action.liked { background: var(--text); color: var(--bg); }

/* Навигация */
.bottom-nav {
    position: absolute; bottom: 0; left: 0; right: 0; height: 70px;
    background: var(--bg); border-top: 2px solid var(--border);
    display: flex; align-items: center; justify-content: space-around; z-index: 200;
}
.nav-btn { background: none; border: none; color: var(--text); cursor: pointer; display: flex; flex-direction: column; align-items: center; font-family: inherit; font-weight: 700; font-size: 10px; text-transform: uppercase; }
.nav-btn .material-icons-round { font-size: 28px; margin-bottom: 2px; }
.nav-btn-create { width: 50px; height: 50px; background: var(--text); color: var(--bg); display: flex; align-items: center; justify-content: center; }

/* Модалки */
.fullscreen-modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; padding: 20px; }
.fs-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 2px solid var(--border); margin-bottom: 20px; }

/* Сетка эмодзи */
.emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; border: 2px solid var(--border); padding: 10px; max-height: 200px; overflow-y: auto; }
.emoji-grid span { font-size: 24px; cursor: pointer; text-align: center; padding: 5px; }
.emoji-grid span:hover { background: var(--text); color: var(--bg); }

.age-selector { display: flex; flex-direction: column; gap: 8px; }
.age-option { border: 2px solid var(--border); padding: 12px; cursor: pointer; font-weight: 700; display: flex; justify-content: space-between; }
.age-option.selected { background: var(--text); color: var(--bg); }

/* Утилиты */
.hidden { display: none !important; }
.btn-icon { background: none; border: none; color: var(--text); cursor: pointer; }
</style>
</head>
<body>

<div id="app">
    <!-- ЭКРАН ВХОДА -->
    <div class="screen active" id="loginScreen">
        <div style="padding-top: 60px;">
            <h1 style="font-size: 40px; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; margin-bottom: 10px;">OnlyMemes</h1>
            <p style="margin-bottom: 40px; font-weight: 500;">БЕЛЫЙ. АСФАЛЬТОВЫЙ. ТВОЙ.</p>
            
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <input type="text" id="loginName" placeholder="ИМЯ ПОЛЬЗОВАТЕЛЯ">
                <input type="password" id="loginPass" placeholder="ПАРОЛЬ">
                
                <label class="checkbox-row">
                    <input type="checkbox" id="loginPolicy">
                    <span style="font-size: 13px; font-weight: 700;">ПРИНИМАЮ ПРАВИЛА СООБЩЕСТВА</span>
                </label>
                
                <button class="btn btn-primary" onclick="handleLogin()">ВОЙТИ В СЕТЬ</button>
                <button class="btn btn-secondary" onclick="showScreen('registerScreen')">РЕГИСТРАЦИЯ</button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div class="screen" id="registerScreen">
        <div class="header">
            <button class="btn-icon" onclick="showScreen('loginScreen')"><span class="material-icons-round">arrow_back</span></button>
            <div class="header-title">РЕГИСТРАЦИЯ</div>
            <div style="width:24px"></div>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" id="regName" placeholder="ВАШЕ ИМЯ">
            <input type="text" id="regHandle" placeholder="NICKNAME">
            
            <p style="font-weight: 800; font-size: 12px; margin-top: 10px;">ВЫБЕРИТЕ АВАТАР:</p>
            <div class="emoji-grid" id="regEmojiGrid"></div>
            
            <input type="password" id="regPass" placeholder="ПАРОЛЬ">
            
            <p style="font-weight: 800; font-size: 12px; margin-top: 10px;">ВАШ ВОЗРАСТ:</p>
            <div class="age-selector">
                <div class="age-option" data-age="6+" onclick="selectAge(this,'reg')">РЕБЕНОК <span>6+</span></div>
                <div class="age-option" data-age="14+" onclick="selectAge(this,'reg')">ПОДРОСТОК <span>14+</span></div>
                <div class="age-option" data-age="18+" onclick="selectAge(this,'reg')">ВЗРОСЛЫЙ <span>18+</span></div>
            </div>

            <button class="btn btn-primary" onclick="handleRegister()" style="margin-top: 20px;">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div class="screen" id="mainScreen">
        <div id="feedView">
            <div class="header">
                <div class="header-title">OnlyMemes</div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-icon" onclick="toggleTheme()"><span class="material-icons-round">contrast</span></button>
                    <button class="btn-icon" onclick="handleLogout()"><span class="material-icons-round">logout</span></button>
                </div>
            </div>
            <div id="feedList"></div>
        </div>

        <div id="profileView" class="hidden">
            <div class="header">
                <div class="header-title">ПРОФИЛЬ</div>
                <button class="btn-icon" onclick="showEditProfile()"><span class="material-icons-round">settings</span></button>
            </div>
            <div id="profileContent"></div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" onclick="switchTab('feed')"><span class="material-icons-round">grid_view</span>ЛЕНТА</button>
            <button class="nav-btn-create" onclick="showCreatePost()"><span class="material-icons-round">add</span></button>
            <button class="nav-btn" onclick="switchTab('profile')"><span class="material-icons-round">face</span>ПРОФИЛЬ</button>
        </div>
    </div>
</div>

<!-- МОДАЛКА СОЗДАНИЯ ПОСТА -->
<div id="modalContainer"></div>

<script>
/* Логика Firebase и Sandbox */
var IS_SANDBOXED = false;
try { localStorage.getItem('test'); } catch(e) { IS_SANDBOXED = true; }

var DB_URL = 'https://onlymems-fe4e6-default-rtdb.firebaseio.com';
var currentUser = null;
var selectedRegEmoji = '💀';
var selectedRegAge = '';
var selectedPostAge = '';

// Кастомный упрощенный DB-адаптер
const DB = {
    ref: (path) => ({
        once: (type) => fetch(`${DB_URL}/${path}.json`).then(r => r.json()).then(data => ({
            val: () => data,
            exists: () => data !== null,
            forEach: (cb) => { if(data) Object.keys(data).forEach(k => cb({key: k, val: () => data[k]})); }
        })),
        set: (val) => fetch(`${DB_URL}/${path}.json`, { method: 'PUT', body: JSON.stringify(val) }),
        push: (val) => fetch(`${DB_URL}/${path}.json`, { method: 'POST', body: JSON.stringify(val) }).then(r => r.json()),
        update: (val) => fetch(`${DB_URL}/${path}.json`, { method: 'PATCH', body: JSON.stringify(val) }),
        remove: () => fetch(`${DB_URL}/${path}.json`, { method: 'DELETE' })
    })
};

/* Инициализация */
function init() {
    const emojis = ['💀','🤡','👻','👽','🤖','🎃','⭐','🔥','⚡','🌈','🍕','🍔','💎','💊','🧿','🎲'];
    const grid = document.getElementById('regEmojiGrid');
    emojis.forEach(e => {
        const span = document.createElement('span');
        span.textContent = e;
        span.onclick = () => {
            Array.from(grid.children).forEach(c => c.style.background = 'none');
            span.style.background = 'var(--text)';
            span.style.color = 'var(--bg)';
            selectedRegEmoji = e;
        };
        grid.appendChild(span);
    });

    const savedUid = localStorage.getItem('om_uid');
    if(savedUid) {
        DB.ref(`users/${savedUid}`).once('value').then(snap => {
            if(snap.exists()) {
                currentUser = snap.val();
                currentUser.uid = savedUid;
                enterApp();
            } else {
                showScreen('loginScreen');
            }
        });
    }
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function toggleTheme() {
    const theme = document.documentElement.getAttribute('data-theme');
    document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'light' : 'dark');
}

function selectAge(el, ctx) {
    el.parentElement.querySelectorAll('.age-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    if(ctx === 'reg') selectedRegAge = el.dataset.age;
    if(ctx === 'post') selectedPostAge = el.dataset.age;
}

/* Авторизация */
function handleLogin() {
    const name = document.getElementById('loginName').value.trim();
    const pass = document.getElementById('loginPass').value;
    const policy = document.getElementById('loginPolicy').checked;

    if(!name || !pass || !policy) return alert('Заполните все поля и примите правила');

    DB.ref('users').once('value').then(snap => {
        let found = null;
        snap.forEach(child => {
            const u = child.val();
            if(u.handle === name.toLowerCase() && u.password === pass) {
                found = u;
                found.uid = child.key;
            }
        });

        if(found) {
            currentUser = found;
            localStorage.setItem('om_uid', found.uid);
            enterApp();
        } else {
            alert('Неверные данные');
        }
    });
}

function handleRegister() {
    const name = document.getElementById('regName').value.trim();
    const handle = document.getElementById('regHandle').value.trim().toLowerCase();
    const pass = document.getElementById('regPass').value;

    if(!name || !handle || !pass || !selectedRegAge) return alert('Заполните все данные');

    const newUser = {
        displayName: name,
        handle: handle,
        password: pass,
        avatar: selectedRegEmoji,
        ageGroup: selectedRegAge,
        createdAt: Date.now()
    };

    DB.ref('users').push(newUser).then(res => {
        currentUser = newUser;
        currentUser.uid = res.name;
        localStorage.setItem('om_uid', res.name);
        enterApp();
    });
}

function enterApp() {
    showScreen('mainScreen');
    loadFeed();
}

function handleLogout() {
    localStorage.removeItem('om_uid');
    location.reload();
}

/* Лента */
function loadFeed() {
    DB.ref('posts').once('value').then(snap => {
        const list = document.getElementById('feedList');
        list.innerHTML = '';
        const posts = [];
        snap.forEach(child => {
            posts.push({id: child.key, ...child.val()});
        });
        posts.reverse().forEach(p => {
            const el = document.createElement('div');
            el.className = 'post';
            el.innerHTML = `
                <div class="post-header">
                    <div class="post-avatar">${p.authorAvatar || '💀'}</div>
                    <div>
                        <div class="post-username">${p.authorName}</div>
                        <div class="post-handle">@${p.authorHandle}</div>
                    </div>
                </div>
                <div class="post-title">${p.title}</div>
                <div class="post-content">${p.content}</div>
                <div class="post-actions">
                    <button class="post-action" onclick="alert('Like!')">
                        <span class="material-icons-round">thumb_up</span> 
                        ${p.likes ? Object.keys(p.likes).length : 0}
                    </button>
                    <div style="margin-left: auto; font-size: 10px; font-weight: 800; border: 1px solid var(--border); padding: 4px;">${p.ageGroup}</div>
                </div>
            `;
            list.appendChild(el);
        });
    });
}

function switchTab(tab) {
    if(tab === 'feed') {
        document.getElementById('feedView').classList.remove('hidden');
        document.getElementById('profileView').classList.add('hidden');
    } else {
        document.getElementById('feedView').classList.add('hidden');
        document.getElementById('profileView').classList.remove('hidden');
        renderProfile();
    }
}

function renderProfile() {
    const cont = document.getElementById('profileContent');
    cont.innerHTML = `
        <div style="text-align: center; padding: 40px 0;">
            <div style="width: 100px; height: 100px; border: 4px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 60px; margin: 0 auto 20px;">
                ${currentUser.avatar}
            </div>
            <h2 style="font-size: 24px; text-transform: uppercase; font-weight: 900;">${currentUser.displayName}</h2>
            <p style="color: var(--text-dim);">@${currentUser.handle}</p>
            <div style="margin-top: 20px; font-weight: 800; border: 2px solid var(--border); display: inline-block; padding: 5px 15px;">
                КАТЕГОРИЯ: ${currentUser.ageGroup}
            </div>
        </div>
    `;
}

function showCreatePost() {
    const modal = document.createElement('div');
    modal.className = 'fullscreen-modal';
    modal.innerHTML = `
        <div class="fs-header">
            <div class="header-title">НОВЫЙ МЕМ</div>
            <button class="btn-icon" onclick="this.parentElement.parentElement.remove()"><span class="material-icons-round">close</span></button>
        </div>
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" id="postTitle" placeholder="ЗАГОЛОВОК">
            <textarea id="postContent" placeholder="ТЕКСТ МЕМА..." style="height: 150px; border: 2px solid var(--border); background: var(--bg); color: var(--text); padding: 10px; font-family: inherit; outline: none;"></textarea>
            <p style="font-weight: 800; font-size: 12px;">КАТЕГОРИЯ:</p>
            <div class="age-selector">
                <div class="age-option" data-age="6+" onclick="selectAge(this,'post')">ДЛЯ ВСЕХ <span>6+</span></div>
                <div class="age-option" data-age="14+" onclick="selectAge(this,'post')">ПОДРОСТКИ <span>14+</span></div>
                <div class="age-option" data-age="18+" onclick="selectAge(this,'post')">ВЗРОСЛЫЕ <span>18+</span></div>
            </div>
            <button class="btn btn-primary" onclick="submitPost()">ОПУБЛИКОВАТЬ</button>
        </div>
    `;
    document.body.appendChild(modal);
}

function submitPost() {
    const title = document.getElementById('postTitle').value;
    const content = document.getElementById('postContent').value;
    
    if(!title || !content || !selectedPostAge) return alert('Заполните все поля');

    const post = {
        title: title,
        content: content,
        ageGroup: selectedPostAge,
        authorId: currentUser.uid,
        authorName: currentUser.displayName,
        authorHandle: currentUser.handle,
        authorAvatar: currentUser.avatar,
        createdAt: Date.now()
    };

    DB.ref('posts').push(post).then(() => {
        document.querySelector('.fullscreen-modal').remove();
        loadFeed();
    });
}

init();
</script>
</body>
</html>
